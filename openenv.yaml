name: pharmatrials-env
version: 1.0.0
description: >
  A clinical-trial document intelligence environment for AI agents.
  Agents review, extract, and reconcile regulatory documents (ICFs,
  protocols, SAPs, AE narratives) under partial-progress reward signals.
author: PharmaTrials-Env Contributors
license: Apache-2.0
tags:
  - openenv
  - document-intelligence
  - clinical-trials
  - regulatory
  - information-extraction
  - multi-document-reasoning

tasks:
  - id: EASY
    task_id: EASY
    name: ICF Extraction
    task_name: ICF Extraction
    enabled: true
    description: Extract 12 structured fields from a single ICF document.
    difficulty: easy
    max_steps: 15
    has_grader: true
    grader:
      type: python
      name: ICFExtractionGrader
      implementation: pharmatrials_env.graders.icf_grader.ICFExtractionGrader
      metric: field_accuracy
      enabled: true
    graders:
      - type: python
        name: ICFExtractionGrader
        implementation: pharmatrials_env.graders.icf_grader.ICFExtractionGrader
        metric: field_accuracy
        enabled: true
    reward_range: [0.0, 1.0]
    expected_score_gpt4o: 0.78

  - id: MEDIUM
    task_id: MEDIUM
    name: Protocol-ICF Consistency Check
    task_name: Protocol-ICF Consistency Check
    enabled: true
    description: Identify and classify 5-8 deliberate inconsistencies between a Study Protocol and an ICF.
    difficulty: medium
    max_steps: 25
    has_grader: true
    grader:
      type: python
      name: ConsistencyGrader
      implementation: pharmatrials_env.graders.consistency_grader.ConsistencyGrader
      metric: inconsistency_f1
      enabled: true
    graders:
      - type: python
        name: ConsistencyGrader
        implementation: pharmatrials_env.graders.consistency_grader.ConsistencyGrader
        metric: inconsistency_f1
        enabled: true
    reward_range: [0.0, 1.0]
    expected_score_gpt4o: 0.54

  - id: HARD
    task_id: HARD
    name: SAP-AE Narrative Reconciliation
    task_name: SAP-AE Narrative Reconciliation
    enabled: true
    description: Reconcile AE narratives against SAP specifications, identifying coding errors and undetected SAEs.
    difficulty: hard
    max_steps: 40
    has_grader: true
    grader:
      type: python
      name: ReconciliationGrader
      implementation: pharmatrials_env.graders.reconciliation_grader.ReconciliationGrader
      metric: weighted_reconciliation_score
      enabled: true
    graders:
      - type: python
        name: ReconciliationGrader
        implementation: pharmatrials_env.graders.reconciliation_grader.ReconciliationGrader
        metric: weighted_reconciliation_score
        enabled: true
    reward_range: [0.0, 1.0]
    expected_score_gpt4o: 0.30

observation_space:
  type: dict
  fields:
    task_id: string
    step_number: integer
    documents: dict[string, DocumentView]
    last_action_result: ActionResult | null
    partial_score: float

action_space:
  type: discriminated_union
  variants: [EXTRACT, COMPARE, SUMMARISE, ANNOTATE, QUERY, SUBMIT]

reward_space:
  type: float
  range: [0.0, 1.0]
  components: [accuracy, completeness, regulatory_alignment, efficiency]

api:
  python_class: pharmatrials_env.PharmaTrialsEnv
  http_base_url: http://localhost:8080
  endpoints:
    reset: POST /reset
    step: POST /step
    state: GET /state

docker:
  image: pharmatrials-env:latest
  port: 7860
  build_command: docker build -t pharmatrials-env .
  run_command: docker run -p 8080:7860 pharmatrials-env
